paths:
  output_dir: ../outputs/hybrid

  # Forecasting pipeline (root project)
  forecasting_config: ../configs/default.yaml
  forecasting_metrics_file: ../outputs/metrics/model_comparison.csv
  forecasting_significance_file: ../outputs/metrics/significance_vs_seasonal.csv

  # Non-linear sub-project
  nonlinear_project_dir: ../non-linear-correlation-analysis
  nonlinear_config: configs/default.yaml
  nonlinear_top_relationships_file: ../non-linear-correlation-analysis/outputs/tables/top_relationships.csv
  nonlinear_insights_file: ../non-linear-correlation-analysis/outputs/insights/insights.txt
  nonlinear_summary_file: ../non-linear-correlation-analysis/outputs/reports/analysis_summary.md

run:
  run_forecasting: true
  run_nonlinear: true
  build_report: true
  continue_on_step_error: true

report:
  target_metric: MAE@1
  baseline_model: Naive
  seasonal_baseline_model: SeasonalNaive
  top_n_nonlinear: 10
