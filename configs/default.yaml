experiment:
  cases_col: Diarrhoea_cases
  compute_rate_per100k: false
  diseases:
  - Influenza_rates
  - Dengue_fever_rates
  - Diarrhoea_rates
  include_other_diseases_as_features: false
  input_sequence_length: 12
  predict_horizon: 6
  social_vars:
  - population_male
  - population_female
  - population_urban
  - population_countryside
  target: Diarrhoea_rates
  test_end: '2017-12-31'
  test_start: '2016-01-01'
  train_end: '2014-12-31'
  val_end: '2015-12-31'
  weather_vars:
  - Total_Evaporation
  - Total_Rainfall
  - Max_Daily_Rainfall
  - n_raining_days
  - Average_temperature
  - Max_Average_Temperature
  - Min_Average_Temperature
  - Max_Absolute_Temperature
  - Min_Absolute_Temperature
  - Average_Humidity
  - Min_Humidity
  - n_hours_sunshine
model:
  hgb:
    max_iter: 300
  lstm:
    epochs: 30
    hidden_size: 64
    lr: 0.001
    num_layers: 2
  xgb:
    colsample_bytree: 0.8
    learning_rate: 0.05
    max_depth: 6
    n_estimators: 300
    subsample: 0.8
paths:
  data_folder: data/raw
  output_dir: outputs
  processed_folder: data/processed
run:
  enable_prophet: true
  enable_shap: true
  random_state: 42
