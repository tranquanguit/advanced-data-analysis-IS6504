# Runtime configuration for dengue forecasting pipeline
paths:
  data_folder: data/raw
  processed_folder: data/processed
  output_dir: outputs

experiment:
  target: Dengue_fever_rates
  weather_vars:
    - Total_Evaporation
    - Total_Rainfall
    - Max_Daily_Rainfall
    - n_raining_days
    - Average_temperature
    - Average_Humidity
    - n_hours_sunshine
  social_vars:
    - poverty_rate
    - clean_water_rate_all
    - urban_water_usage_rate
    - toilet_rate
    - population_density
  lags: [1, 2, 3]
  rolling_windows: [3]
  horizons: [1, 2, 3]
  train_end: "2014-12-31"
  test_start: "2016-01-01"

model:
  xgb:
    n_estimators: 300
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
  hgb:
    max_iter: 300
  lstm:
    hidden_size: 64
    num_layers: 2
    epochs: 30
    lr: 0.001

run:
  enable_prophet: true
  enable_shap: true
  random_state: 42
