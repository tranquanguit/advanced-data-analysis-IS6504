paths:
  data_folder: ../../data/raw
  output_dir: ../outputs

analysis:
  province_col: province
  date_col: date

  disease_vars:
    - Influenza_rates
    - Dengue_fever_rates
    - Diarrhoea_rates

  climate_vars:
  - Total_Evaporation
  - Total_Rainfall
  - Max_Daily_Rainfall
  - n_raining_days
  - Average_temperature
  - Max_Average_Temperature
  - Min_Average_Temperature
  - Max_Absolute_Temperature
  - Min_Absolute_Temperature
  - Average_Humidity
  - Min_Humidity
  - n_hours_sunshine

  social_vars:
  - population_male
  - population_female
  - population_urban
  - population_countryside

  include_other_diseases_as_predictors: true
  lags: [0, 1, 2, 3, 4, 5, 6]

  min_samples_global: 300
  min_samples_province: 24
  min_provinces_global: 12

  max_samples_for_distance: 1500
  max_samples_for_mutual_info: 5000
  max_missing_ratio_pair: 0.40
  min_std_predictor: 1e-9
  min_std_target: 1e-9
  min_unique_predictor: 4

  # Optional confound controls before dependency metrics:
  # - none: raw pair
  # - month: remove monthly seasonal mean
  # - province: remove province fixed mean
  # - month_province: remove both
  control_mode: month_province

  top_k_relationships: 30
  ranking_weights:
    abs_spearman: 0.35
    distance_corr: 0.40
    mutual_info: 0.25

  compute_permutation_p_value: false
  n_permutations: 200
  random_state: 42
